
name: Career Finder CI/CD

on:
  push:
    branches:
      - main

env:
  WEB_IMAGE: ahmedikram567/career-finder-web
  MODEL_IMAGE: ahmedikram567/career-finder-api

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Student Web
        uses: docker/build-push-action@v6
        with:
          context: ./Student
          file: ./Student/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

      - name: Build and Push ML Model
        uses: docker/build-push-action@v6
        with:
          context: ./model
          file: ./model/Dockerfile
          push: true
          tags: |
            ${{ env.MODEL_IMAGE }}:latest
            ${{ env.MODEL_IMAGE }}:${{ github.sha }}

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/career-finder

            docker compose pull
            docker compose up -d

            docker image prune -f

      - name: Health Check
        run: |
          sleep 20
          curl --fail http://${{ secrets.EC2_HOSTtt }}/health

      - name: Collect Docker Logs
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/career-finder

            echo "===== DOCKER PS ====="
            docker ps -a

            echo ""

            echo "===== DOCKER COMPOSE PS ====="
            docker compose ps

            echo ""

            echo "===== DOCKER COMPOSE LOGS ====="
            docker compose logs

      - name: Create Logs File for AI Agent
        if: failure()
        run: |
          cat << EOF > logs.txt
          Pipeline Failure Detected.

          Deployment or Health Check failed.

          Please refer to the Docker and Docker Compose logs printed above in the GitHub Actions console.
          EOF

      - name: Run AI Agent
        if: failure()
        run: |
          python ai-agent-cicd/ai-agent.py logs.txt

