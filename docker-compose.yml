services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: career_finder
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./finaldatabase.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  student-web:
    image: ahmedikram567/career-finder-web:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: career_finder
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "8000:80"
    volumes:
      - student_uploads:/var/www/html/assets/uploads

  model-api:
    image: ahmedikram567/career-finder-api:latest
    restart: unless-stopped
    ports:
      - "8002:8002"

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"

volumes:
  db_data:
  student_uploads: